prompt: "# fix(RHOAIENG-61344): clean up maas-controller bundle on disable via LifecycleReconciler\n\
  \n## Description\n\nFixes [RHOAIENG-61344](https://redhat.atlassian.net/browse/RHOAIENG-61344).\n\
  \n### **Background**\n\nThe ODH operator deploys `maas-controller` via `AppendOperatorInstallManifests`,\
  \ SSA-applying the full bundle (Deployment, CRDs, ClusterRole, ClusterRoleBinding,\
  \ ServiceAccount) labeled `app.opendatahub.io/modelsasservice=true`.\n\nWhen MaaS\
  \ was disabled, `removeTenantIfModelsAsServiceDisabled` in the ODH operator deleted\
  \ only the `Tenant` CR. The Tenant finalizer correctly cleaned up maas-api, gateway\
  \ policies, and Perses dashboards \u2014 but nothing deleted the `maas-controller`\
  \ bundle itself. The Deployment, CRDs, ClusterRoles, ClusterRoleBindings, and ServiceAccount\
  \ remained on the cluster indefinitely.\n\nRoot cause: unlike other ODH components,\
  \ MaaS has `NewCRObject` returning `(nil, nil)`, which means there is no intermediate\
  \ component CR and no ownerReference chain. The ODH GC machinery has nothing to\
  \ cascade-delete the\ncontroller bundle from.\n\nAdditionally, the orphaned `maas-controller`\
  \ was not passive \u2014 it actively fought cleanup by re-creating `default-tenant`\
  \ and logging conflict errors on every reconcile cycle.\n\n### **Fix (this PR)**\n\
  \nAdds a `LifecycleReconciler` that manages a `maas.opendatahub.io/cleanup` finalizer\
  \ on the `maas-controller` Deployment. The companion ODH operator PR ([RHOAIENG-61344](https://redhat.atlassian.net/browse/RHOAIENG-61344))\
  \ deletes the Deployment when MaaS is set to `Removed`. The finalizer keeps the\
  \ Deployment object alive while `LifecycleReconciler` runs\nteardown in the correct\
  \ order:\n\n1. Deletes all `Tenant` CRs and waits for their finalizers to complete\
  \ (cascades to maas-api, auth policies, Perses dashboards).\n2. Deletes `ClusterRole`s\
  \ and CRDs \u2014 while the `ClusterRoleBinding` still grants the SA the permissions\
  \ to do so.\n3. Deletes `ClusterRoleBinding`s last \u2014 removing them revokes\
  \ all cluster-scoped permissions for this SA.\n\n**Companion PR in `opendatahub-operator`**:\
  \ replaces `removeTenantIfModelsAsServiceDisabled` with `deleteMaaSDeploymentIfDisabled`,\
  \ which triggers this cleanup by deleting the Deployment when MaaS is set to `Removed`.\
  \ (To be created)\n\n<img width=\"833\" height=\"492\" alt=\"image\" src=\"https://github.com/user-attachments/assets/13806a44-be03-4858-a2b2-2865907f295f\"\
  \ />\n\n\n## How Has This Been Tested?\n\n**Unit tests** (`go test ./maas-controller/pkg/controller/maas/...`):\n\
  - `TestLifecycleReconciler` covers: finalizer added on healthy Deployment,\n  no-op\
  \ when finalizer already present, Tenants deleted and requeued while\n  terminating,\
  \ ClusterRoles/ClusterRoleBindings/CRDs deleted and finalizer\n  removed once all\
  \ Tenants are gone.\n\n**Live cluster**:\n- Enabled MaaS via DSC, confirmed `maas-controller`\
  \ Deployment running with\n  finalizer present.\n- Patched DSC to `managementState:\
  \ Removed`. Observed in pod logs: Tenants\n  deleted \u2192 ClusterRoles and CRDs\
  \ deleted \u2192 ClusterRoleBindings deleted \u2192\n  finalizer removed \u2192\
  \ Deployment object fully deleted.\n- Verified: `kubectl get all,clusterrole,clusterrolebinding,crd\
  \ -l app.opendatahub.io/modelsasservice=true`\n  returned empty after one reconcile\
  \ cycle.\n\n## Merge criteria:\n\n- [x] The commits are squashed in a cohesive manner\
  \ and have meaningful messages.\n- [x] Testing instructions have been added in the\
  \ PR body (for PRs involving changes that are not immediately obvious).\n- [x] The\
  \ developer has manually tested the changes and verified that the changes work\n\
