  \ previous file-based parameterization.\n  * Image defaults for maas-api, maas-controller,\
  \ payload-processing, and maas-api-key-cleanup are explicitly configurable.\n  *\
  \ Deployment/installer now manages a ConfigMap for image overrides instead of env-var\
  \ patching.\n  * Reduced unnecessary reconciliations previously triggered by deleted\
