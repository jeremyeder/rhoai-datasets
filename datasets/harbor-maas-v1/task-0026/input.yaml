prompt: "# refactor: move Tenant reconciler away from params.env and maas-parameters\n\
  \n<!--- Provide a general summary of your changes in the Title above -->\nhttps://redhat.atlassian.net/browse/RHOAIENG-59864\n\
  \n## Description\n<!--- Describe your changes in detail -->\n**Major**\n\nThis PR\
  \ consolidates the ownership of `params.env` and ConfigMap `maas-parameters`. After\
  \ the change, only ODH reads from `params.env` and writes to `maas-parameters`,\
  \ MaaS doesn't any more. Instead, Tenant reconciler gathers required params from\
  \ MaaS controller args/env vars, Tenant CR and auto-detection, and patches them\
  \ to the manifests with code instead of kustomize.\n\n**Minor**\n\nThis PR also\
  \ includes some other chores:\n- starts to move `params.env` from outdated `/overlays/odh`\
  \ to `base/maas-controller/default`, and includes only the necessary params there\
  \ (the image ones).\n- cleans up useless `shared-patches` and MaaS-side `params.env`.\n\
  - updates a whole bunch of stale or dead docs, scripts and comments.\n\n## How Has\
  \ This Been Tested?\n<!--- Please describe in detail how you tested your changes.\
  \ -->\n<!--- Include details of your testing environment, and the tests you ran\
  \ to -->\n<!--- see how your change affects other areas of the code, etc. -->\n\
  Deployed on a cluster and verified all resources work as before and pass all E2E\
  \ tests.\n\n## Merge criteria:\n<!--- This PR will be merged by any repository approver\
  \ when it meets all the points in the checklist -->\n<!--- Go over all the following\
  \ points, and put an `x` in all the boxes that apply. -->\n\n- [x] The commits are\
  \ squashed in a cohesive manner and have meaningful messages.\n- [x] Testing instructions\
  \ have been added in the PR body (for PRs involving changes that are not immediately\
  \ obvious).\n- [x] The developer has manually tested the changes and verified that\
  \ the changes work\n\n<!-- This is an auto-generated comment: release notes by coderabbit.ai\
  \ -->\n## Summary by CodeRabbit\n\n* **Chores**\n  * Platform values (images, gateway,\
