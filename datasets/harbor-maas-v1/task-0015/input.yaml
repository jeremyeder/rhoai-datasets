prompt: "# chore: post-split RBAC audit, nil CR fixes, and lifecycle observability\n\
  \nAddresses https://redhat.atlassian.net/browse/RHOAIENG-60708\n\n## Description\n\
  Post-split cleanup for `maas-controller` RBAC, CR lifecycle edge cases, and controller\
  \ observability. Addresses the three ACs from the ticket:\n\n**AC1 / AC3** \u2014\
  \ RBAC justification at source\n\nMoved RBAC permission rationale from `clusterrole.yaml`\
  \ (where `controller-gen` strips it on every regeneration) into the `+kubebuilder:rbac`\
  \ marker blocks in Go source, where it is permanent and visible to developers changing\
  \ permissions:\n\n* `tenant_controller.go`: documents why secrets `get;list;watch`\
  \ must remain unrestricted (`payload-processing-reader` escalation check + Kubernetes\
  \ `list/watch` cannot use resourceNames); why `clusterroles/clusterrolebindings`\
  \ CRUD is required (SSA-applies `maas-api` and `payload-processing-reader` ClusterRoles);\
  \ and the escalation-check mirror pattern for maas-api verbs (`endpoints`, `pods`,\
  \ `serviceaccounts/token`, `tokenreviews`, `subjectaccessreviews`).\n* `self_deployment_controller.go`:\
  \ documents the teardown-only `list;delete` verbs for ClusterRoles and CRDs used\
  \ by LifecycleReconciler on ODH disable.\n\n**AC2** \u2014 CR lifecycle nil/partial\
  \ CR handling\n\nThree targeted fixes with matching unit tests:\n* `maasauthpolicy_controller.go`:\
  \ `fetchOIDCConfig` moved after the MaaSAuthPolicy not-found guard \u2014 stale\
  \ or deleted-race reconcile events no longer trigger an unnecessary Tenant Get.\n\
  * `self_deployment_controller.go`: log a visible Info message when a terminating\
  \ Deployment has no CleanupFinalizer (previously a silent no-op with no observability).\n\
  * `self_deployment_controller.go`: log a visible Info message in deleteClusterScopedResources\
  \ when no ClusterRoles, CRDs, or ClusterRoleBindings match the componentLabel \u2014\
  \ surfaces cases where the operator did not stamp the label.\n* main.go: document\
  \ the four-step startup ordering contract (namespace bootstrap \u2192 ensureDefaultTenantRunnable\
  \ \u2192 TenantReconciler \u2192 ODH operator race window) as a code comment.\n\n\
  \n## How Has This Been Tested?\n```\n# Unit tests \u2014 all pass including three\
  \ new tests\nmake -C maas-controller test\n\n# Generated files still in sync with\
  \ markers after comments moved to Go source\nmake -C maas-controller manifests verify-codegen\n\
  ```\nAlso, added couple of new unit tests\n\n## Merge criteria:\n<!--- This PR will\
