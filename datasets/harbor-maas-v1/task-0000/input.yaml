prompt: "# test: add E2E tests for Tenant CR lifecycle\n\n## Summary\n\nAdds E2E test\
  \ suite for Tenant CR lifecycle validation as part of the test ownership reorganization\
  \ ([RHOAIENG-60709](https://redhat.atlassian.net/browse/RHOAIENG-60709)).\n\nRelated\
  \ to https://redhat.atlassian.net/browse/RHOAIENG-59867\n\n## Changes\n\n- **test/e2e/tests/test_tenant.py**\
  \ - 7 integration tests covering:\n  - Tenant singleton existence\n  - Ready condition\
  \ and phase validation\n  - Payload processing deployment checks (when Active)\n\
  \  - Status contract compliance (phase, conditions)\n  - Spec well-formedness\n\
  \  - Kubernetes metav1 condition shape\n  - False ownership prevention (MaaS CRs\
  \ not owned by Tenant)\n\n- **test/e2e/README.md** - Streamlined documentation focusing\
  \ on test execution\n\n- **test/e2e/scripts/prow_run_smoke_test.sh** - Enhanced\
  \ to include Tenant tests in CI\n\n## Test Results\n\nValidated on live OpenShift\
  \ cluster with operator-based deployment:\n\n- \u2705 5 passing (contract tests,\
  \ ownership validation, singleton checks)\n- \u23ED\uFE0F 1 skipped (payload-processing\
  \ not deployed)\n- **Time:** ~5s when Tenant is healthy\n\n## Test Ownership Context\n\
  \nThis PR is part of Phase 1 (Tenant Tests) of the E2E test ownership reorganization:\n\
  - Establishes baseline Tenant CR testing in MaaS CI\n- Validates contract between\
  \ maas-controller and Tenant CR\n- Provides foundation for operator CI contract\
  \ tests (Phase 2)\n\nDSC enable/disable and Tenant deletion lifecycle remain in\
  \ operator CI scope.\n\n## How to Run\n\n```bash\ncd test/e2e\nexport DEPLOYMENT_NAMESPACE=\"\
  opendatahub\"  # or wherever Tenant lives\nsource .venv/bin/activate\npytest tests/test_tenant.py\
  \ -v\n```\n\nFull smoke test (includes all E2E modules):\n```bash\n./test/e2e/scripts/prow_run_smoke_test.sh\n\
